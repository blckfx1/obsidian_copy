<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Obsidian Copy • Triple Pane</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .app {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 48px 1fr;
            height: 100vh;
        }
        .header {
            grid-column: 2 / 3;
            grid-row: 1;
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-weight: 500;
        }
        .sidebar {
            grid-row: 1 / 3;
            grid-column: 1;
            background: #252526;
            border-right: 1px solid #3e3e42;
            padding: 16px 8px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #new-note-btn {
            background: #0e639c;
            border: none;
            color: white;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }
        #new-note-btn:hover { background: #1177bb; }
        #note-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #note-list li {
            background: #2d2d30;
            padding: 8px 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 0.9rem;
        }
        #note-list li:hover { background: #3e3e42; }
        .panes-container {
            grid-row: 2;
            grid-column: 2;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: #3e3e42;
            overflow: hidden;
        }
        .pane {
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .note-title {
            background: #2d2d30;
            padding: 10px 12px;
            font-weight: 600;
            border-bottom: 1px solid #3e3e42;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        textarea {
            width: 100%;
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 16px;
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }
        textarea:focus { background: #252526; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #3e3e42; border-radius: 4px; }
    </style>

    <script type="module">
        import { initDB, getAllNotes, getNote, saveNote, deleteNote } from './db.js';

        let activePaneNotes = [null, null, null];

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await initDB();
                console.log("✅ Database initialized");

                await refreshNoteList();

                // Create welcome note if empty
                let notes = await getAllNotes();
                if (notes.length === 0) {
                    const welcome = {
                        id: Date.now().toString(),
                        title: "Welcome to Obsidian Copy",
                        content: "# Welcome!\n\nClick **+ New Note** to start writing."
                    };
                    await saveNote(welcome);
                    await refreshNoteList();
                }

                // Open notes in panes
                notes = await getAllNotes();
                for (let i = 0; i < 3; i++) {
                    if (notes[i]) {
                        await openNoteInPane(i, notes[i].id);
                    }
                }

                // New Note button
                const newNoteBtn = document.getElementById('new-note-btn');
                if (newNoteBtn) {
                    newNoteBtn.addEventListener('click', createNewNote);
                    console.log("✅ New Note button listener added");
                }
            } catch (err) {
                console.error("❌ Error during initialization:", err);
            }
        });

        async function refreshNoteList() {
            const notes = await getAllNotes();
            notes.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

            const ul = document.getElementById('note-list');
            if (!ul) return;
            ul.innerHTML = '';

            for (const note of notes) {
                const li = document.createElement('li');
                li.textContent = note.title || 'Untitled';
                li.style.cursor = 'pointer';

                li.addEventListener('click', () => {
                    const emptyIndex = activePaneNotes.findIndex(id => id === null);
                    const target = emptyIndex !== -1 ? emptyIndex : 0;
                    openNoteInPane(target, note.id);
                });

                // Delete button
                const del = document.createElement('span');
                del.textContent = ' ❌';
                del.style.marginLeft = 'auto';
                del.style.cursor = 'pointer';
                del.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (confirm(`Delete "${note.title}"?`)) {
                        await deleteNote(note.id);
                        await refreshNoteList();
                    }
                });

                li.appendChild(del);
                ul.appendChild(li);
            }
        }

        async function openNoteInPane(paneIndex, noteId) {
            const note = await getNote(noteId);
            if (!note) return;

            activePaneNotes[paneIndex] = noteId;

            const pane = document.querySelector(`.pane[data-pane="${paneIndex}"]`);
            if (!pane) return;

            const titleEl = pane.querySelector('.note-title');
            const textarea = pane.querySelector('textarea');

            if (titleEl) titleEl.textContent = note.title || 'Untitled';
            if (textarea) {
                textarea.value = note.content || '';
                setupAutoSave(textarea, noteId);
            }
        }

        function setupAutoSave(textarea, noteId) {
            let timeout;
            // Remove old listeners first
            textarea.oninput = null;

            textarea.oninput = async () => {
                clearTimeout(timeout);
                timeout = setTimeout(async () => {
                    const note = await getNote(noteId);
                    if (note) {
                        note.content = textarea.value;
                        await saveNote(note);
                    }
                }, 600);
            };
        }

        async function createNewNote() {
            const newId = 'note-' + Date.now();
            const newNote = {
                id: newId,
                title: "Untitled Note",
                content: ""
            };

            await saveNote(newNote);
            await refreshNoteList();

            const emptyIndex = activePaneNotes.findIndex(id => id === null);
            const targetPane = emptyIndex !== -1 ? emptyIndex : 0;

            await openNoteInPane(targetPane, newId);
            console.log("✅ New note created and opened in pane", targetPane);
        }

        // Safety backup
        window.createNewNote = createNewNote;
    </script>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>◈ Obsidian Copy • Triple Pane</h1>
        </div>
        <div class="sidebar">
            <button id="new-note-btn">+ New Note</button>
            <ul id="note-list"></ul>
        </div>
        <div class="panes-container">
            <div class="pane" data-pane="0">
                <div class="note-title">Untitled</div>
                <textarea placeholder="Write here..."></textarea>
            </div>
            <div class="pane" data-pane="1">
                <div class="note-title">Untitled</div>
                <textarea placeholder="Write here..."></textarea>
            </div>
            <div class="pane" data-pane="2">
                <div class="note-title">Untitled</div>
                <textarea placeholder="Write here..."></textarea>
            </div>
        </div>
    </div>
</body>
</html>
